<section id="skills" class="section section--alt">
  <div class="section__container">
    <h2 class="section__title">Compétences</h2>

    <div class="skills-grid">
      @for (group of skillGroups; track group.category) {
        <div class="skill-group">
          <div class="skill-group__header">
            <span class="skill-group__icon">{{ group.icon }}</span>
            <h3 class="skill-group__name">{{ group.category }}</h3>
          </div>
          <div class="skill-group__tags">
            @for (skill of group.skills; track skill) {
              <span class="skill-tag">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
